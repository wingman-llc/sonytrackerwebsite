<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Wingman Security</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        h1 {
            font-size: 5rem;
            margin: 0;
            color: #38bdf8;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin: 10px 0;
        }

        .brand {
            color: #38bdf8;
            font-weight: bold;
        }

        .status-text {
            color: #94a3b8;
            font-size: 0.95rem;
            margin-top: 10px;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 18px;
            background-color: #38bdf8;
            color: #0f172a;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p class="status-text">
            The page you’re looking for doesn’t exist or has been moved.<br>
            Protected by <span class="brand">Wingman Security</span>.
        </p>

        <a href="/home" class="btn">Go Home</a>
    </div>

</body>
</html>
